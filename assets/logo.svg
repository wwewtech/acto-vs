<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="clip">
      <rect width="200" height="200" rx="38"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Background -->
    <rect width="200" height="200" fill="#000"/>

    <!-- Base shape: triangle pointing right — becomes the "lens" of converging lines -->
    <!-- Apex at (144,100) = left tangent of circle, perfectly flush -->
    <polygon points="22,36 22,164 144,100" fill="#fff"/>

    <!-- Black cuts through the triangle to reveal 5 parallel white lines -->
    <!-- Line heights: 10px, gaps: 10px, margins: 19px top/bottom  -->
    <!-- This produces a symmetric lens: widths ≈ 46 / 84 / 122 / 84 / 46 px -->

    <rect x="0" y="36"  width="200" height="19" fill="#000"/> <!-- top margin  -->
    <rect x="0" y="65"  width="200" height="10" fill="#000"/> <!-- gap 1 → 2   -->
    <rect x="0" y="85"  width="200" height="10" fill="#000"/> <!-- gap 2 → 3   -->
    <rect x="0" y="105" width="200" height="10" fill="#000"/> <!-- gap 3 → 4   -->
    <rect x="0" y="125" width="200" height="10" fill="#000"/> <!-- gap 4 → 5   -->
    <rect x="0" y="145" width="200" height="55" fill="#000"/> <!-- bottom margin-->

    <!-- Collection circle — drawn last (on top of all cuts) -->
    <!-- Left edge exactly at x=144, touching the triangle apex -->
    <circle cx="162" cy="100" r="18" fill="#fff"/>

  </g>
</svg>